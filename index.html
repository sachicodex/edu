<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduFlow Cloud | Learning Operations Suite</title>
    <meta
      name="description"
      content="Production-ready SaaS platform to discover, organize, and optimize educational video learning."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="js/main.js"></script>
    <script>
      window.YOUTUBE_API_KEY = "AIzaSyB4GbkD4Zd7PW-P1ym_v6U6-4E8SbVYyz8";
      window.FIREBASE_CONFIG = {
        apiKey: "AIzaSyB3W9JfnwHshArkdvry784VRdLZMaM8e1Y",
        authDomain: "sachicodex-edu-test.firebaseapp.com",
        projectId: "sachicodex-edu-test",
        storageBucket: "sachicodex-edu-test.firebasestorage.app",
        messagingSenderId: "990789366745",
        appId: "1:990789366745:web:a15d456505c5e28db29fc8"
      };
    </script>

    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/script.js"></script>
  </head>

  <body>
    <div id="loading-screen" class="loading-screen">
      <div class="loading-brand">EduFlow Cloud</div>
      <div class="loading-progress"><span></span></div>
      <p>Syncing workspace...</p>
    </div>

    <div class="app-shell">
      <aside id="sidebar" class="sidebar" aria-label="Workspace navigation">
        <div class="sidebar-head">
          <div class="brand-mark" aria-hidden="true">
            <i data-lucide="sparkles"></i>
          </div>
          <div>
            <div class="brand-name">EduFlow</div>
            <div class="brand-sub">Learning Ops</div>
          </div>
        </div>

        <nav class="nav" aria-label="Primary">
          <button class="nav-link active" data-route="overview">
            <i data-lucide="layout-dashboard"></i>
            Overview
          </button>
          <button class="nav-link" data-route="library">
            <i data-lucide="library-big"></i>
            Library
          </button>
          <button class="nav-link" data-route="playlists">
            <i data-lucide="list-video"></i>
            Playlists
          </button>
          <button class="nav-link" data-route="saved">
            <i data-lucide="bookmark"></i>
            Saved
            <span id="saved-count" class="count-pill">0</span>
          </button>
          <button class="nav-link" data-route="analytics">
            <i data-lucide="chart-column"></i>
            Analytics
          </button>
        </nav>

        <div class="sidebar-foot">
          <div class="profile-card">
            <div class="avatar">SC</div>
            <div>
              <div class="name">Sachi Workspace</div>
              <div class="role">Productive learner mode</div>
            </div>
          </div>
        </div>
      </aside>

      <div id="mobile-overlay" class="mobile-overlay"></div>

      <main class="workspace">
        <header class="topbar">
          <button id="sidebar-toggle" class="icon-btn mobile-only" aria-label="Open navigation">
            <i data-lucide="menu"></i>
          </button>

          <form id="search-form" class="search-box" role="search">
            <i data-lucide="search"></i>
            <input
              id="search-input"
              type="search"
              placeholder="Search by title, topic, tags, difficulty..."
              autocomplete="off"
            />
            <button id="search-btn" type="submit" class="soft-btn">Search</button>
          </form>

          <div class="topbar-actions">
            <div id="sort-select" class="sort-select" aria-label="Sort videos">
              <button
                id="sort-trigger"
                class="sort-select-trigger soft-select"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
              >
                <span id="sort-trigger-label">Newest</span>
                <i data-lucide="chevron-down"></i>
              </button>
              <div id="sort-menu" class="sort-menu hidden" role="listbox" aria-label="Sort options">
                <button type="button" class="sort-option" data-sort="newest" role="option">Newest</button>
                <button type="button" class="sort-option" data-sort="oldest" role="option">Oldest</button>
                <button type="button" class="sort-option" data-sort="most-viewed" role="option">Most Viewed</button>
                <button type="button" class="sort-option" data-sort="duration-long" role="option">Duration: Longest</button>
                <button type="button" class="sort-option" data-sort="duration-short" role="option">Duration: Shortest</button>
                <button type="button" class="sort-option" data-sort="alphabetical" role="option">A to Z</button>
              </div>
            </div>
            <button id="view-toggle" class="icon-btn" title="Toggle layout">
              <i data-lucide="layout-grid"></i>
            </button>
            <button id="upload-btn" class="primary-btn">
              <i data-lucide="upload"></i>
              Add YouTube
            </button>
          </div>
        </header>

        <section class="hero-panel">
          <div>
            <h1 id="route-title">Overview</h1>
          </div>
          <div class="hero-kpis">
            <article>
              <span>Total Videos</span>
              <strong id="stat-videos">0</strong>
            </article>
            <article>
              <span>Learning Hours</span>
              <strong id="stat-hours">0h</strong>
            </article>
            <article>
              <span>Saved Queue</span>
              <strong id="stat-saved">0</strong>
            </article>
            <article>
              <span>Completion</span>
              <strong id="stat-completion">0%</strong>
            </article>
          </div>
        </section>

        <section class="filters-wrap">
          <div>
            <p class="filter-label">Category</p>
            <div id="category-filters" class="chip-row"></div>
          </div>
          <div>
            <p class="filter-label">Difficulty</p>
            <div id="difficulty-filters" class="chip-row"></div>
          </div>
        </section>

        <section id="content-meta" class="content-meta">
          <div id="results-text">Loading content...</div>
          <button id="clear-filters" class="soft-btn">Reset filters</button>
        </section>

        <section id="content-grid" class="content-grid" aria-live="polite"></section>

        <section id="playlist-detail" class="playlist-detail hidden" aria-live="polite">
          <div class="playlist-top">
            <button id="playlist-back" class="soft-btn">
              <i data-lucide="arrow-left"></i>
              Back to playlists
            </button>
            <div>
              <h2 id="playlist-title">Playlist</h2>
              <p id="playlist-description"></p>
            </div>
          </div>
          <div id="playlist-grid" class="content-grid"></div>
        </section>
      </main>
    </div>

    <div id="video-modal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="modal-backdrop" data-close="video"></div>
      <div class="modal-card video-modal-card">
        <button class="modal-close" data-close="video" aria-label="Close video modal">
          <i data-lucide="x"></i>
        </button>
        <div id="video-iframe-wrap" class="video-frame-wrap"></div>
        <div class="video-modal-body">
          <h3 id="video-modal-title"></h3>
          <p id="video-modal-desc"></p>
          <div id="video-modal-meta" class="video-modal-meta"></div>
          <div class="modal-actions">
            <button id="modal-open-source" class="soft-btn">
              <i data-lucide="external-link"></i>
              Open Source
            </button>
            <button id="modal-save" class="soft-btn">
              <i data-lucide="bookmark"></i>
              Save
            </button>
            <button id="modal-complete" class="soft-btn">
              <i data-lucide="check-check"></i>
              Mark Complete
            </button>
            <button id="modal-share" class="soft-btn">
              <i data-lucide="share-2"></i>
              Share
            </button>
            <button id="modal-edit" class="soft-btn">
              <i data-lucide="square-pen"></i>
              Edit
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="edit-modal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="modal-backdrop" data-close="edit"></div>
      <div class="modal-card edit-modal-card">
        <button class="modal-close" data-close="edit" aria-label="Close edit modal">
          <i data-lucide="x"></i>
        </button>
        <h3>Edit Video</h3>
        <form id="edit-form" class="edit-form">
          <label class="floating-field">
            <input id="edit-title" type="text" placeholder=" " required />
            <span class="field-label">Title</span>
          </label>
          <label class="floating-field">
            <textarea id="edit-description" rows="7" placeholder=" "></textarea>
            <span class="field-label">Description</span>
          </label>
          <label class="floating-field">
            <input id="edit-category" type="text" placeholder=" " />
            <span class="field-label">Category</span>
          </label>
          <label class="floating-field select-field is-active">
            <select id="edit-difficulty">
              <option>Beginner</option>
              <option>Intermediate</option>
              <option>Advanced</option>
            </select>
            <span class="field-label">Difficulty</span>
          </label>
          <label class="floating-field">
            <input id="edit-thumbnail" type="url" placeholder=" " />
            <span class="field-label">Thumbnail URL</span>
          </label>
          <label class="floating-field">
            <input id="edit-youtube" type="url" placeholder=" " />
            <span class="field-label">YouTube URL</span>
          </label>

          <div class="edit-actions">
            <button id="edit-delete" type="button" class="btn btn-outline">
              <i data-lucide="trash-2"></i>
              Delete
            </button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </body>
</html>
