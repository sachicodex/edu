<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDUCATION</title>
  <link rel="stylesheet" href="https://raw.githubusercontent.com/sachicodex/sachicodex.github.io/refs/heads/main/css/preloader.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body>

    <!-- Preloader -->

    <div class="loader">
      <main>
        <svg height="128px" width="128px" viewBox="0 0 128 128" class="pl1">
          <defs>
            <linearGradient y2="1" x2="1" y1="0" x1="0" id="pl-grad">
              <stop stop-color="#000" offset="0%"></stop>
              <stop stop-color="#fff" offset="100%"></stop>
            </linearGradient>
            <mask id="pl-mask">
              <rect fill="url(#pl-grad)" height="128" width="128" y="0" x="0"></rect>
            </mask>
          </defs>

          <g fill="#ffcf67">
            <g class="pl1__g">
              <g transform="translate(20,20) rotate(0,44,44)">
                <g class="pl1__rect-g">
                  <rect height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                  <rect transform="translate(0,48)" height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                </g>
                <g transform="rotate(180,44,44)" class="pl1__rect-g">
                  <rect height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                  <rect transform="translate(0,48)" height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                </g>
              </g>
            </g>
          </g>

          <g mask="url(#pl-mask)" fill="#d3321d">
            <g class="pl1__g">
              <g transform="translate(20,20) rotate(0,44,44)">
                <g class="pl1__rect-g">
                  <rect height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                  <rect transform="translate(0,48)" height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                </g>
                <g transform="rotate(180,44,44)" class="pl1__rect-g">
                  <rect height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                  <rect transform="translate(0,48)" height="40" width="40" ry="8" rx="8" class="pl1__rect"></rect>
                </g>
              </g>
            </g>
          </g>
        </svg>
      </main>

      <div class="progress-loader">
        <div class="progress"></div>
        <div class="progress-value">0%</div>
      </div>
    </div>

    <div class="size-box"></div>
    <h2>A/L EDUCATION SUMMARY</h2>
    <div class="grid" id="imageGrid"></div>

  <script src="js/script.js"></script>
  <script src="../sachicodex.github.io/js/preloader.js"></script>
</body>
</html>
